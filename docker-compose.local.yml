volumes:
  chat_app_local_postgres_data: {}
  chat_app_local_postgres_data_backups: {}
  redis_data: {}

services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: chat_app_local_django
    container_name: chat_app_local_django
    depends_on:
      - postgres
      - redis
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: chat_app_production_postgres
    container_name: chat_app_local_postgres
    volumes:
      - chat_app_local_postgres_data:/var/lib/postgresql/18/docker
      - chat_app_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  redis:
    image: redis:latest
    container_name: chat_app_local_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
